types_hash_max_size 4096;

upstream web_upstream {
    server web:80;
}

upstream api_upstream {
    server nginx-api:80;
}

# ── Frontend (Vue) ──
# server_name lists BOTH the local-dev hostname and the production
# domain. The proxy can't tell which environment it's in; listing both
# means a single nginx.conf works for `docker compose up` locally AND
# for the Hetzner VPS sitting behind Cloudflare.
server {
    listen 80;
    server_name buttercupperfumery.local buttercupperfumery.com www.buttercupperfumery.com;

    location / {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}

# ── API ──
server {
    listen 80;
    server_name api.buttercupperfumery.local api.buttercupperfumery.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

# ── Default ──
server {
    listen 80 default_server;
    server_name _;
    return 404;
}
